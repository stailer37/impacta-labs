services:

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=impacta2025
      - MINIO_API_PORT_NUMBER=9000
      - MINIO_CONSOLE_PORT_NUMBER=9001
      - MINIO_SCHEME=http
    healthcheck:
      test: [ "CMD", "mc", "admin", "info", "play/" ]
      interval: 2s
      timeout: 10s
      retries: 2
      start_period: 15s
    command: server --address ":9000" --console-address ":9001" /data
    networks:
      infra-data-network:
    ports:
      - "9000:9000"
      - "9001:9001"

  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin impacta2025 &&
      mc admin accesskey create local --name impacta-lab-key --access-key 4PRJYFLGzQYTnOJGH1gA --secret-key ovBkCsqh2cXNkyoteCzQMV5JWCUk5tHfsG1GwYbD &&
      mc mb -p local/raw local/trusted local/refined
      "
    networks:
      infra-data-network:

  trino:
    image: trinodb/trino:latest
    healthcheck:
      test: [ "CMD", "curl", "-I", "http://localhost:8080/v1/status" ]
      interval: 3s
      timeout: 15s
      retries: 3
      start_period: 15s
    ports:
      - "8084:8080"
      - "8085:8081"
    environment:
      - AWS_ACCESS_KEY_ID=4PRJYFLGzQYTnOJGH1gA
      - AWS_SECRET_ACCESS_KEY=ovBkCsqh2cXNkyoteCzQMV5JWCUk5tHfsG1GwYbD
    volumes:
      - ./configs/trino/etc:/etc/trino
    networks:
      infra-data-network:

  dbt:
    build:
      context: ./configs/dbt
      dockerfile: Dockerfile
    depends_on:
      - trino
    volumes:
      - ./volumes/dbt/sales_lakehouse:/usr/app
      - ./configs/dbt/profiles.yml:/root/.dbt/profiles.yml:ro
    command: [ "--version" ]
    networks:
      infra-data-network:

  airflow_db:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRES_USER=airflow_user
      - POSTGRES_PASSWORD=airflow_pass
      - POSTGRES_DB=airflow_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U airflow_user -p 5432 -d airflow_db" ]
      interval: 2s
      timeout: 10s
      retries: 2
      start_period: 10s
    networks:
      infra-data-network:

  airflow_init:
    build: &airflow-build
      context: ./configs/airflow
      dockerfile: Dockerfile
    image: &airflow-image modern-data-stack-airflow:latest
    depends_on:
      airflow_db:
        condition: service_healthy
    environment: &airflow-environment
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow_user:airflow_pass@airflow_db:5432/airflow_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__WEBSERVER__SECRET_KEY=impacta-modern-data-stack-secret-key
      - DBT_PROFILES_DIR=/opt/dbt_profiles
    volumes: &airflow-volumes
      - ./volumes/airflow/dags:/opt/airflow/dags
      - ./volumes/airflow/logs:/opt/airflow/logs
      - ./volumes/dbt/sales_lakehouse:/opt/dbt/sales_lakehouse
      - ./configs/dbt/profiles.yml:/opt/dbt_profiles/profiles.yml:ro
    entrypoint: /bin/bash
    command:
      - -c
      - "airflow db migrate && airflow users create --username admin --password impacta2025 --firstname Admin --lastname User --role Admin --email admin@localhost"
    restart: "no"
    networks:
      infra-data-network:

  airflow_webserver:
    build: *airflow-build
    image: *airflow-image
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    environment: *airflow-environment
    volumes: *airflow-volumes
    command: webserver
    healthcheck:
      test: [ "CMD", "curl", "-I", "http://localhost:8080/health" ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 30s
    ports:
      - "8089:8080"
    networks:
      infra-data-network:

  airflow_scheduler:
    build: *airflow-build
    image: *airflow-image
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    environment: *airflow-environment
    volumes: *airflow-volumes
    command: scheduler
    networks:
      infra-data-network:

  superset:
    build:
      context: ./configs/superset
      dockerfile: Dockerfile
    environment:
      - DATABASE_HOST=superset_db
      - DATABASE_PORT=5432
      - DATABASE_USER=superset_user
      - DATABASE_DB=superset_db
      - DATABASE_PASSWORD=superset_pass
    entrypoint:
      - bash
      - setup.sh
    healthcheck:
      test: [ "CMD", "curl", "-I", "http://localhost:8088/swagger/v1" ]
      interval: 3s
      timeout: 15s
      retries: 3
      start_period: 15s
    depends_on:
      - superset_db
    volumes:
      - ./volumes/superset/superset-data:/app/superset_home
      - ./configs/superset/setup.sh:/app/setup.sh
    ports:
      - '8088:8088'
    networks:
      infra-data-network:

  superset_db:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRES_USER=superset_user
      - POSTGRES_PASSWORD=superset_pass
      - POSTGRES_DB=superset_db
    volumes:
      - ./volumes/superset/superset-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U superset_user -p 5432 -d superset_db" ]
      interval: 2s
      timeout: 10s
      retries: 2
      start_period: 10s
    networks:
      infra-data-network:

  lakekeeper:
    image: &lakekeeper-image ${LAKEKEEPER__SERVER_IMAGE:-quay.io/lakekeeper/catalog:latest-main}
    pull_policy: &lakekeeper-pull-policy always
    environment: &lakekeeper-environment
      - LAKEKEEPER__PG_ENCRYPTION_KEY=This-is-NOT-Secure!
      - LAKEKEEPER__PG_DATABASE_URL_READ=postgresql://lakekeeper_user:lakekeeper_pass@lakekeeper_db:5432/lakekeeper_db
      - LAKEKEEPER__PG_DATABASE_URL_WRITE=postgresql://lakekeeper_user:lakekeeper_pass@lakekeeper_db:5432/lakekeeper_db
      - LAKEKEEPER__AUTHZ_BACKEND=allowall
    command: [ "serve" ]
    healthcheck:
      test: [ "CMD", "/home/nonroot/lakekeeper", "healthcheck" ]
      interval: 1s
      timeout: 10s
      retries: 3
      start_period: 3s
    depends_on:
      lakekeeper_migrate:
        condition: service_completed_successfully
      lakekeeper_db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      infra-data-network:
    ports:
      - "8181:8181"

  lakekeeper_migrate:
    image: ${LAKEKEEPER_TEST__SERVER_IMAGE:-quay.io/lakekeeper/catalog:latest-main}
    pull_policy: always
    environment:
      - LAKEKEEPER__PG_ENCRYPTION_KEY=This-is-NOT-Secure!
      - LAKEKEEPER__PG_DATABASE_URL_READ=postgresql://lakekeeper_user:lakekeeper_pass@lakekeeper_db:5432/lakekeeper_db
      - LAKEKEEPER__PG_DATABASE_URL_WRITE=postgresql://lakekeeper_user:lakekeeper_pass@lakekeeper_db:5432/lakekeeper_db
      - RUST_LOG=info
    restart: "no"
    command: [ "migrate" ]
    depends_on:
      lakekeeper_db:
        condition: service_healthy
    networks:
      infra-data-network:   
  
  lakekeeper_skip_bootstrap:
    image: curlimages/curl
    depends_on:
      lakekeeper:
        condition: service_healthy
    restart: "no"
    command:
      - -w
      - "%{http_code}"
      - "-X"
      - "POST"
      - "-v"
      - "http://lakekeeper:8181/management/v1/bootstrap"
      - "-H"
      - "Content-Type: application/json"
      - "--data"
      - '{"accept-terms-of-use": true}'
      - "-o"
      - "/dev/null"
      - "--fail-with-body"
    networks:
      infra-data-network:

  lakekeeper_bootstrap_refined:
    image: curlimages/curl
    depends_on:
      lakekeeper_skip_bootstrap:
        condition: service_completed_successfully
      minio_init:
        condition: service_completed_successfully
    restart: "no"
    volumes:
      - ./configs/lakekeeper/create-warehouse-refined.json:/tmp/create-warehouse-refined.json:ro
    command:
      - -w
      - "%{http_code}"
      - "-X"
      - "POST"
      - "-v"
      - "http://lakekeeper:8181/management/v1/warehouse"
      - "-H"
      - "Content-Type: application/json"
      - "--data"
      - "@/tmp/create-warehouse-refined.json"
      - "-o"
      - "/dev/null"
      - "--fail-with-body"
    networks:
      infra-data-network:

  lakekeeper_db:
    image: bitnami/postgresql:latest
    environment:
      - POSTGRES_USER=lakekeeper_user
      - POSTGRES_PASSWORD=lakekeeper_pass
      - POSTGRES_DB=lakekeeper_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lakekeeper_user -p 5432 -d lakekeeper_db" ]
      interval: 2s
      timeout: 10s
      retries: 2
      start_period: 10s
    networks:
      infra-data-network:

  nifi:
    image: apache/nifi:2.4.0
    container_name: nifi
    ports:
      - "8443:8443"
    environment:
      - NIFI_WEB_HTTPS_PORT=8443
      - SINGLE_USER_CREDENTIALS_USERNAME=admin
      - SINGLE_USER_CREDENTIALS_PASSWORD=ctsBtRBKHRAx69EqUghvvgEvjnaLjFEB
    volumes:
        - ./configs/nifi/mysql-connector-j-9.3.0.jar:/opt/nifi/nifi-current/lib/mysql-connector-j-9.3.0.jar
        - ./configs/nifi/postgresql-42.7.5.jar:/opt/nifi/nifi-current/lib/postgresql-42.7.5.jar
        - ./configs/nifi/nifi-parquet-nar-2.4.0.nar:/opt/nifi/nifi-current/lib/nifi-parquet-nar-2.4.0.nar
        - ./configs/nifi/nifi-hadoop-libraries-nar-2.4.0.nar:/opt/nifi/nifi-current/lib/nifi-hadoop-libraries-nar-2.4.0.nar
        - ./volumes/nifi/nifi_data:/opt/nifi/nifi-current/data
        - ./volumes/nifi/nifi_logs:/opt/nifi/nifi-current/logs
    restart: unless-stopped
    networks:
      infra-data-network:

  sales_db:
    image: bitnami/postgresql:latest
    environment:
       POSTGRES_DB: sales_db
       POSTGRES_USER: sales_user
       POSTGRES_PASSWORD: sales_pass
    volumes:
      - ./configs/sales/sales-schema.sql:/docker-entrypoint-initdb.d/01-sales-schema.sql
      - ./configs/sales/sales-seed.sql:/docker-entrypoint-initdb.d/02-sales-seed.sql
      - ./volumes/sales:/bitnami/postgresql
    ports:
       - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sales_user -p 5432 -d sales_db" ]
      interval: 2s
      timeout: 10s
      retries: 2
      start_period: 10s
    networks:
      infra-data-network:

  kafka:
    image: apache/kafka:4.3.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092" ]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      infra-data-network:

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      infra-data-network:

  pos_producer:
    profiles: [ "streaming" ]
    build:
      context: ./configs/pos_producer
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      sales_db:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC=pos_transactions
      - SALES_DB_DSN=postgresql://sales_user:sales_pass@sales_db:5432/sales_db
      - SLEEP_SECONDS=2
    networks:
      infra-data-network:

  spark_streaming:
    profiles: [ "streaming" ]
    image: bitnamilegacy/spark:3.5.3
    user: root
    depends_on:
      kafka:
        condition: service_healthy
      lakekeeper:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    environment:
      - AWS_ACCESS_KEY_ID=4PRJYFLGzQYTnOJGH1gA
      - AWS_SECRET_ACCESS_KEY=ovBkCsqh2cXNkyoteCzQMV5JWCUk5tHfsG1GwYbD
    volumes:
      - ./configs/spark/streaming_app.py:/app/streaming_app.py:ro
      - spark_ivy_cache:/opt/bitnami/spark/.ivy2
    command: >
      spark-submit
      --master local[*]
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.7.0,org.apache.iceberg:iceberg-aws-bundle:1.7.0,org.apache.hadoop:hadoop-aws:3.3.4
      /app/streaming_app.py
    ports:
      - "4040:4040"
    networks:
      infra-data-network:

networks:
  infra-data-network:

volumes:
  spark_ivy_cache: